# Continuous integration: lint, type-check, and test every push / pull request.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Qt runtime libraries (offscreen tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libopengl0 libxkbcommon0 libglib2.0-0
      - name: Install project
        run: pip install -e ".[ui,raw,cv,dev]"
      - name: Lint + types + tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          ruff check src tests
          mypy
          pytest -q
